name: Build Installer Initrd

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'initrd/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/build-initrd.yml'
  workflow_dispatch:
    inputs:
      force_x1e:
        description: 'Force X1E rebuild even if unchanged'
        required: false
        default: 'false'
        type: boolean

jobs:
  # Check what changed to determine which builds are needed
  changes:
    runs-on: ubuntu-latest
    outputs:
      x1e: ${{ steps.filter.outputs.x1e }}
      generic: ${{ steps.filter.outputs.generic }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            x1e:
              - 'initrd/x1e.nix'
              - 'flake.lock'
              - '.github/workflows/build-initrd.yml'
            generic:
              - 'initrd/default.nix'
              - 'flake.nix'
              - 'flake.lock'
              - '.github/workflows/build-initrd.yml'

  build-x86_64:
    needs: changes
    if: needs.changes.outputs.generic == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        with:
          name: nixos-easy-install
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Build installer boot assets
        run: nix build .#packages.x86_64-linux.installer-boot-assets --print-build-logs
      
      - name: Prepare artifacts
        run: |
          mkdir -p dist/x86_64
          cp result/bzImage dist/x86_64/
          cp result/initrd dist/x86_64/
          cp result/init-path dist/x86_64/
          cp result/SHA256SUMS dist/x86_64/
          echo "Built for x86_64:"
          ls -la dist/x86_64/
          cat dist/x86_64/SHA256SUMS
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: initrd-x86_64-linux
          path: dist/
          retention-days: 7

  build-aarch64:
    needs: changes
    if: needs.changes.outputs.generic == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        with:
          name: nixos-easy-install
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Build installer boot assets
        run: nix build .#packages.aarch64-linux.installer-boot-assets --print-build-logs
      
      - name: Prepare artifacts
        run: |
          mkdir -p dist/aarch64
          cp result/bzImage dist/aarch64/
          cp result/initrd dist/aarch64/
          cp result/init-path dist/aarch64/
          cp result/SHA256SUMS dist/aarch64/
          echo "Built for aarch64:"
          ls -la dist/aarch64/
          cat dist/aarch64/SHA256SUMS
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: initrd-aarch64-linux
          path: dist/
          retention-days: 7
  
  build-aarch64-x1e:
    needs: changes
    # Only build X1E if x1e files changed, or it's a release, or force_x1e is true
    if: needs.changes.outputs.x1e == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.force_x1e == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        with:
          name: nixos-easy-install
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      
      - name: Build Snapdragon X1E boot assets
        run: nix build .#packages.aarch64-linux.installer-boot-assets-x1e --print-build-logs
      
      - name: Prepare artifacts
        run: |
          mkdir -p dist/aarch64-x1e
          cp result/bzImage dist/aarch64-x1e/
          cp result/initrd dist/aarch64-x1e/
          cp result/init-path dist/aarch64-x1e/
          cp result/platform dist/aarch64-x1e/
          cp result/default-device dist/aarch64-x1e/
          cp result/dtb-name dist/aarch64-x1e/ || echo "no dtb-name"
          cp result/device.dtb dist/aarch64-x1e/ || echo "no device.dtb"
          cp -r result/dtbs dist/aarch64-x1e/ || echo "no dtbs dir"
          cp result/SHA256SUMS dist/aarch64-x1e/
          echo "Built for aarch64 (Snapdragon X1E):"
          ls -la dist/aarch64-x1e/
          cat dist/aarch64-x1e/SHA256SUMS
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: initrd-aarch64-x1e
          path: dist/
          retention-days: 7
  
  create-release:
    needs: [changes, build-x86_64, build-aarch64, build-aarch64-x1e]
    # Run if it's a tag push and at least the generic builds succeeded
    # X1E is optional (may be skipped if unchanged)
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.build-x86_64.result == 'success' && needs.build-aarch64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p release
          
          # Combine architectures (some may not exist if skipped)
          for arch_dir in artifacts/initrd-*/; do
            if [[ -d "$arch_dir" ]]; then
              arch=$(basename "$arch_dir" | sed 's/initrd-//' | sed 's/-linux//')
              cp -r "$arch_dir"/* release/
            fi
          done
          
          # Create combined manifest for files inside tarballs
          cd release
          for arch in x86_64 aarch64 aarch64-x1e; do
            if [[ -d $arch ]]; then
              (cd $arch && cat SHA256SUMS | sed "s|^|$arch/|") >> SHA256SUMS.txt
            fi
          done
          
          # Create tarballs
          for arch in x86_64 aarch64 aarch64-x1e; do
            if [[ -d $arch ]]; then
              tar czf nixos-installer-$arch.tar.gz $arch/
              # Add tarball checksum for download verification
              sha256sum nixos-installer-$arch.tar.gz >> SHA256SUMS.txt
            fi
          done
          
          echo "Release contents:"
          ls -la
          echo "SHA256SUMS.txt contents:"
          cat SHA256SUMS.txt || echo "SHA256SUMS.txt not found!"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nixos-installer-x86_64.tar.gz
            release/nixos-installer-aarch64.tar.gz
            release/nixos-installer-aarch64-x1e.tar.gz
            release/SHA256SUMS.txt
          body: |
            ## NixOS Easy Install - Boot Assets
            
            Contains the kernel and initrd for the NixOS installer.
            
            ### Downloads
            - `nixos-installer-x86_64.tar.gz` - For Intel/AMD systems
            - `nixos-installer-aarch64.tar.gz` - For ARM64 systems (generic)
            - `nixos-installer-aarch64-x1e.tar.gz` - For Snapdragon X Elite laptops (Lenovo Yoga Slim 7x, ThinkPad T14s Gen 6)
            
            ### Snapdragon X Elite Support
            The `aarch64-x1e` variant includes the custom kernel from [x1e-nixos-config](https://github.com/kuruczgy/x1e-nixos-config)
            with proper device tree support for Snapdragon X Elite devices.
            
            ### Checksums
            See `SHA256SUMS.txt` for verification.
